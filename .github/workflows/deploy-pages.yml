name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시될 때 배포
  push:
    branches: [main]
  # Actions 탭에서 수동 실행도 가능
  workflow_dispatch:

# Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 (진행 중인 배포는 유지)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 저장소 루트의 정적 파일 전체를 업로드
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
